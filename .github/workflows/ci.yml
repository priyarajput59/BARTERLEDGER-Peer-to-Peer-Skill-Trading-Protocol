name: BarterLedger CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Smart Contract Tests ───────────────────────────────────────────────────
  contract-tests:
    name: 🦀 Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt 2>/dev/null || true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test trade-vault
        run: cargo test -p trade-vault --features testutils -- --nocapture

      - name: Test reputation-ledger
        run: cargo test -p reputation-ledger --features testutils -- --nocapture

      - name: Build WASM
        run: |
          cargo build --target wasm32-unknown-unknown --release -p trade-vault
          cargo build --target wasm32-unknown-unknown --release -p reputation-ledger

      - name: Optimize WASM
        run: |
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/trade_vault.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/trade_vault.optimized.wasm
          soroban contract optimize \
            --wasm target/wasm32-unknown-unknown/release/reputation_ledger.wasm \
            --wasm-out target/wasm32-unknown-unknown/release/reputation_ledger.optimized.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/*.optimized.wasm
          retention-days: 30

  # ─── Frontend Tests & Build ─────────────────────────────────────────────────
  frontend-tests:
    name: ⚡ Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_TRADE_VAULT_ID:       ${{ secrets.TRADE_VAULT_ID       || 'PLACEHOLDER' }}
          VITE_REPUTATION_LEDGER_ID: ${{ secrets.REPUTATION_LEDGER_ID || 'PLACEHOLDER' }}
          VITE_TOKEN_ID:             ${{ secrets.TOKEN_ID             || 'PLACEHOLDER' }}

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Deploy Contracts (main only) ──────────────────────────────────────────
  deploy-contracts:
    name: 🚀 Deploy to Testnet
    needs: [contract-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            contracts/target/
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('contracts/Cargo.lock') }}

      - uses: actions/download-artifact@v4
        with:
          name: wasm-contracts
          path: contracts/target/wasm32-unknown-unknown/release/

      - name: Install Soroban CLI
        run: cargo install --locked soroban-cli --features opt 2>/dev/null || true

      - name: Configure network
        run: |
          soroban network add \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015" \
            testnet || true

      - name: Fund deployer
        run: |
          soroban keys generate deployer --network testnet 2>/dev/null || true
          curl -s "https://friendbot.stellar.org?addr=$(soroban keys address deployer)" | jq .

      - name: Deploy TradeVault
        id: deploy-vault
        run: |
          VAULT_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/trade_vault.optimized.wasm \
            --source deployer --network testnet)
          echo "VAULT_ID=$VAULT_ID" >> $GITHUB_OUTPUT
          echo "TradeVault: $VAULT_ID"

      - name: Deploy ReputationLedger
        id: deploy-ledger
        run: |
          LEDGER_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/reputation_ledger.optimized.wasm \
            --source deployer --network testnet)
          echo "LEDGER_ID=$LEDGER_ID" >> $GITHUB_OUTPUT
          echo "ReputationLedger: $LEDGER_ID"

      - name: Deploy token (native wrapped XLM)
        id: deploy-token
        run: |
          DEPLOYER=$(soroban keys address deployer)
          TOKEN_ID=$(soroban contract deploy \
            --wasm target/wasm32-unknown-unknown/release/trade_vault.optimized.wasm \
            --source deployer --network testnet) || TOKEN_ID="native"
          echo "TOKEN_ID=$DEPLOYER" >> $GITHUB_OUTPUT

      - name: Initialize contracts
        run: |
          DEPLOYER=$(soroban keys address deployer)
          VAULT_ID="${{ steps.deploy-vault.outputs.VAULT_ID }}"
          LEDGER_ID="${{ steps.deploy-ledger.outputs.LEDGER_ID }}"

          soroban contract invoke --id "$LEDGER_ID" --source deployer --network testnet \
            -- initialize --admin "$DEPLOYER" --vault_address "$VAULT_ID"

          soroban contract invoke --id "$VAULT_ID" --source deployer --network testnet \
            -- initialize --admin "$DEPLOYER" \
            --ledger_address "$LEDGER_ID" \
            --token_address "$DEPLOYER"

          echo "✅ Contracts initialized with cross-references"

      - name: Save deployment manifest
        run: |
          mkdir -p ../deployment
          cat > ../deployment/testnet.json << EOF
          {
            "network": "testnet",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "trade_vault": "${{ steps.deploy-vault.outputs.VAULT_ID }}",
            "reputation_ledger": "${{ steps.deploy-ledger.outputs.LEDGER_ID }}"
          }
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-manifest
          path: deployment/testnet.json

  # ─── Deploy Frontend ────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend
    needs: [deploy-contracts, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'
